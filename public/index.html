<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Command Center</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.99/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.99/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.0.0/satellite.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #map-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #menu-btn { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0, 40, 0, 0.9); border: 2px solid #0f0; color: #0f0; padding: 10px 15px; cursor: pointer; font-size: 20px; border-radius: 5px; box-shadow: 0 0 10px #0f0; }
        #sidebar { position: absolute; top: 0; left: -300px; width: 280px; height: 100vh; background: rgba(0, 15, 0, 0.95); border-right: 1px solid #0f0; transition: 0.3s; z-index: 99; padding: 80px 20px 20px; box-sizing: border-box; backdrop-filter: blur(10px); overflow-y: auto; }
        #sidebar.open { left: 0; }
        .row { margin-bottom: 15px; display: flex; align-items: center; border-bottom: 1px solid #003300; padding-bottom: 10px; }
        input[type="checkbox"] { margin-right: 15px; transform: scale(1.5); accent-color: #0f0; }
        .legend { margin-top: 20px; font-size: 11px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        #intel { display: none; position: absolute; bottom: 0; left: 0; width: 100vw; background: rgba(0, 10, 0, 0.95); border-top: 2px solid #0f0; padding: 15px; z-index: 10; box-sizing: border-box; border-radius: 12px 12px 0 0; }
        table { width: 100%; color: #0f0; font-size: 13px; }
        a { color: #00ffff; }
    </style>
</head>
<body>
    <div id="map-container"></div>
    <div id="menu-btn" onclick="toggleMenu()">☰</div>
    <div id="sidebar">
        <h3>OSINT FEEDS</h3>
        <div class="row"><input type="checkbox" onchange="h('sat', this.checked)"><label>FULL SAT CATALOG</label></div>
        <div class="row"><input type="checkbox" onchange="h('air', this.checked)"><label>TACTICAL AVIATION</label></div>
        <div class="row"><input type="checkbox" onchange="h('mar', this.checked)"><label>MARINE (BALTIC AIS)</label></div>
        <div class="row"><input type="checkbox" onchange="h('q', this.checked)"><label>USGS QUAKES</label></div>
        <div class="row"><input type="checkbox" onchange="h('cam', this.checked)"><label>CCTV NODES</label></div>
        
        <div class="legend">
            <p>INTEL KEY:</p>
            <div><span class="dot" style="background:red"></span>MILITARY/GOV</div>
            <div><span class="dot" style="background:cyan"></span>COMMS/SHIPS</div>
            <div><span class="dot" style="background:yellow"></span>NAV/GPS</div>
            <div><span class="dot" style="background:lime"></span>AIRCRAFT</div>
        </div>
    </div>
    <div id="intel"></div>

    <script>
        const viewer = new Cesium.Viewer('map-container', {
            animation: false, baseLayerPicker: false, fullscreenButton: false, geocoder: false,
            homeButton: false, infoBox: false, sceneModePicker: false, selectionIndicator: false,
            timeline: false, navigationHelpButton: false,
            imageryProvider: new Cesium.UrlTemplateImageryProvider({ url : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png' })
        });

        const planeSVG = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzBmMDAiPjxwYXRoIGQ9Ik0yMSA8bDItMmgzTDExIDIgOSAyaDJsOCAxME0yMSA4bC0yIDJIM2wtMiAyaDZsMiAyaDV2OGgydi04aDVsMi0yaDZsLTIgMnoiLz48L3N2Zz4=';

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        viewer.screenSpaceEventHandler.setInputAction(function(m) {
            const pick = viewer.scene.pick(m.position);
            const panel = document.getElementById('intel');
            if (Cesium.defined(pick) && pick.id) {
                panel.style.display = 'block';
                panel.innerHTML = `<h4>${pick.id.name}</h4>${pick.id.description.getValue(viewer.clock.currentTime)}`;
            } else { panel.style.display = 'none'; }
        }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

        let loops = {};
        let cachedTLE = null;

        async function prefetchSats() {
            try {
                const r = await fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle');
                cachedTLE = (await r.text()).trim().split('\n');
            } catch (e) {}
        }
        prefetchSats();

        function h(l, e) {
            if (e) {
                if (l === 'sat') { fS(); loops.sat = setInterval(fS, 30000); }
                if (l === 'air') { fA(); loops.air = setInterval(fA, 15000); }
                if (l === 'q') { fQ(); loops.q = setInterval(fQ, 60000); }
                if (l === 'cam') fC();
                if (l === 'mar') { fM(); loops.mar = setInterval(fM, 30000); }
            } else { if (loops[l]) clearInterval(loops[l]); cl(l + '_'); document.getElementById('intel').style.display = 'none'; }
        }

        function cl(p) { viewer.entities.values.filter(e => e.id && e.id.startsWith(p)).forEach(e => viewer.entities.remove(e)); }

        async function fS() {
            if (!cachedTLE) await prefetchSats();
            cl('sat_');
            const now = new Date(); let gmst = satellite.gstime(now);
            for (let i = 0, c = 0; i < cachedTLE.length - 2 && c < 2000; i += 3, c++) {
                const name = cachedTLE[i].trim();
                const rec = satellite.twoline2satrec(cachedTLE[i+1], cachedTLE[i+2]);
                const pEci = satellite.propagate(rec, now).position;
                if (pEci) {
                    const pGd = satellite.eciToGeodetic(pEci, gmst);
                    let satColor = Cesium.Color.WHITE;
                    if (name.includes('USA') || name.includes('COSMOS')) satColor = Cesium.Color.RED;
                    else if (name.includes('STARLINK') || name.includes('IRIDIUM')) satColor = Cesium.Color.CYAN;
                    else if (name.includes('GPS') || name.includes('GALILEO')) satColor = Cesium.Color.YELLOW;

                    viewer.entities.add({ 
                        id: 'sat_'+c, name: '🛰️ ' + name,
                        position: Cesium.Cartesian3.fromDegrees(satellite.degreesLong(pGd.longitude), satellite.degreesLat(pGd.latitude), pGd.height * 1000),
                        point: { pixelSize: 3, color: satColor },
                        description: `<table><tr><td>Alt:</td><td>${Math.round(pGd.height)}km</td></tr><tr><td>Intel:</td><td><a href="https://www.n2yo.com/satellite/?s=${rec.satnum}" target="_blank">NORAD DATABASE</a></td></tr></table>`
                    });
                }
            }
        }

        async function fA() {
            try {
                const r = await fetch('https://opensky-network.org/api/states/all');
                const d = await r.json(); cl('air_');
                d.states.slice(0, 400).forEach(p => {
                    if (p[5] && p[6]) {
                        viewer.entities.add({ 
                            id: 'air_'+p[0], name: '✈️ '+(p[1]||'UNK'), 
                            position: Cesium.Cartesian3.fromDegrees(p[5], p[6], p[7]||9000),
                            billboard: { image: planeSVG, width: 18, height: 18, rotation: Cesium.Math.toRadians(p[10] || 0) },
                            description: `<table><tr><td>ICAO:</td><td>${p[0]}</td></tr><tr><td>Track:</td><td><a href="https://www.flightaware.com/live/flight/${p[1]}" target="_blank">AIRCRAFT INTEL</a></td></tr></table>`
                        });
                    }
                });
            } catch (err) {}
        }

        async function fM() {
            try {
                const r = await fetch('https://meri.digitraffic.fi/api/ais/v1/locations');
                const d = await r.json(); cl('mar_');
                d.features.slice(0, 600).forEach(f => {
                    const coords = f.geometry.coordinates;
                    viewer.entities.add({ 
                        id: 'mar_'+f.mmsi, name: '🚢 MMSI: ' + f.mmsi, 
                        position: Cesium.Cartesian3.fromDegrees(coords[0], coords[1]),
                        point: { pixelSize: 6, color: Cesium.Color.CYAN, outlineColor: Cesium.Color.BLACK, outlineWidth: 1 },
                        description: `<table><tr><td>Speed:</td><td>${f.properties.sog || 0} kts</td></tr><tr><td>DB:</td><td><a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:${f.mmsi}" target="_blank">VESSEL INTEL</a></td></tr></table>`
                    });
                });
                viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(24.93, 60.16, 5000000) });
            } catch(e) {}
        }

        async function fQ() {
            try {
                const r = await fetch('https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson');
                const d = await r.json(); cl('q_');
                d.features.forEach(f => {
                    viewer.entities.add({ id: 'q_'+f.id, name: '⚠️ Mag '+f.properties.mag, position: Cesium.Cartesian3.fromDegrees(f.geometry.coordinates[0], f.geometry.coordinates[1]),
                    point: { pixelSize: f.properties.mag * 3, color: Cesium.Color.RED },
                    description: `<table><tr><td>Loc:</td><td>${f.properties.place}</td></tr></table>` });
                });
            } catch (err) {}
        }

        async function fC() {
            try {
                const r = await fetch('https://data.seattle.gov/resource/xqku-cgqf.json');
                const d = await r.json();
                d.forEach(cam => {
                    viewer.entities.add({ id: 'cam_'+cam.cameralabel, name: '📹 '+cam.cameralabel, position: Cesium.Cartesian3.fromDegrees(cam.location.coordinates[0], cam.location.coordinates[1]),
                    point: { pixelSize: 10, color: Cesium.Color.CYAN },
                    description: `<center><img src="${c.imageurl.url}"/><p>LIVE SURVEILLANCE</p></center>` });
                });
                viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(-122.33, 47.6, 60000) });
            } catch (err) {}
        }
    </script>
</body>
</html>
